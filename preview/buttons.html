<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:24px;font-family:var(--font-body);}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:14px;}
  .btn{font-family:var(--font-body);font-weight:700;font-size:15px;padding:14px 22px;border-radius:999px;border:none;cursor:pointer;letter-spacing:0.01em;transition:all 200ms var(--ease-out);}
  .btn-primary{background:var(--accent);color:var(--accent-ink);box-shadow:0 0 24px rgba(179,240,0,0.2);}
  .btn-primary:hover{background:#9fd800;}
  .btn-secondary{background:transparent;color:var(--fg);border:1px solid var(--border-strong);}
  .btn-ghost{background:transparent;color:var(--accent);}
  .btn-sm{padding:10px 16px;font-size:13px;}
  .btn-back{background:transparent;color:var(--fg-muted);padding:8px 12px;}
  .lbl{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-subtle);min-width:80px;}
</style></head>
<body>
<div class="row"><span class="lbl">Primary</span>
  <button class="btn btn-primary">Rezerviraj termin</button>
  <button class="btn btn-primary btn-sm">Potvrdi</button>
</div>
<div class="row"><span class="lbl">Secondary</span>
  <button class="btn btn-secondary">Saznaj više</button>
  <button class="btn btn-ghost">Saznaj više →</button>
  <button class="btn btn-back">← Nazad</button>
</div>
</body></html>
