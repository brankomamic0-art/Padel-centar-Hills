<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Shadow & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:28px;font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
  .c{background:var(--bg-elev);border:1px solid var(--border);border-radius:14px;height:100px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--fg-muted);}
  .s1{box-shadow:0 1px 2px rgba(0,0,0,0.3);}
  .s2{box-shadow:0 8px 24px rgba(0,0,0,0.35);}
  .s3{box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .s4{box-shadow:0 0 32px rgba(179,240,0,0.35);border-color:var(--accent);color:var(--accent);}
</style></head>
<body>
<div class="grid">
  <div class="c s1">shadow-sm</div>
  <div class="c s2">shadow-md</div>
  <div class="c s3">shadow-lg</div>
  <div class="c s4">shadow-glow</div>
</div>
</body></html>
