<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Booking Slot Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:22px;font-family:var(--font-body);}
  h4{margin:0 0 12px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
  table{width:100%;border-collapse:separate;border-spacing:6px;}
  th{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--fg-muted);text-align:center;padding:4px;}
  td{text-align:center;padding:10px 6px;border-radius:8px;font-family:var(--font-display);font-weight:700;font-size:13px;}
  .free{background:#b3f000;color:#0a1421;cursor:pointer;}
  .booked{background:#ff3b3b;color:#fff;cursor:not-allowed;}
  .selected{background:#132536;color:#fff;box-shadow:0 0 0 2px #fff, 0 0 18px rgba(255,255,255,0.45);}
  .time{font-family:var(--font-body);font-weight:500;color:var(--fg-muted);font-size:12px;}
</style></head>
<body>
<h4>Termin · 60 min · 18. travnja</h4>
<table>
  <thead><tr><th></th><th>Teren 1</th><th>Teren 2</th><th>Teren 3</th><th>Teren 4</th></tr></thead>
  <tbody>
    <tr><td class="time">18:00</td><td class="free">08:00</td><td class="booked">zauzet</td><td class="free">08:00</td><td class="free">08:00</td></tr>
    <tr><td class="time">19:00</td><td class="booked">zauzet</td><td class="free">09:00</td><td class="selected">odabran</td><td class="booked">zauzet</td></tr>
    <tr><td class="time">20:00</td><td class="free">10:00</td><td class="free">10:00</td><td class="booked">zauzet</td><td class="free">10:00</td></tr>
  </tbody>
</table>
</body></html>
