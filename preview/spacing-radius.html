<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Spacing & Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:20px;font-family:var(--font-body);}
  h4{margin:0 0 10px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);}
  .stack{display:flex;gap:12px;align-items:flex-end;margin-bottom:18px;}
  .bar{background:var(--accent);border-radius:4px;}
  .lbl{font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--fg-muted);margin-top:4px;text-align:center;}
  .r-row{display:flex;gap:12px;}
  .r{width:64px;height:64px;background:var(--bg-elev-2);border:1px solid var(--border-strong);display:flex;align-items:flex-end;justify-content:center;padding:4px;font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
<h4>Spacing (4px base)</h4>
<div class="stack">
  <div><div class="bar" style="width:4px;height:4px"></div><div class="lbl">1</div></div>
  <div><div class="bar" style="width:8px;height:8px"></div><div class="lbl">2</div></div>
  <div><div class="bar" style="width:12px;height:12px"></div><div class="lbl">3</div></div>
  <div><div class="bar" style="width:16px;height:16px"></div><div class="lbl">4</div></div>
  <div><div class="bar" style="width:24px;height:24px"></div><div class="lbl">6</div></div>
  <div><div class="bar" style="width:32px;height:32px"></div><div class="lbl">8</div></div>
  <div><div class="bar" style="width:48px;height:48px"></div><div class="lbl">12</div></div>
  <div><div class="bar" style="width:64px;height:64px"></div><div class="lbl">16</div></div>
</div>
<h4>Radius</h4>
<div class="r-row">
  <div class="r" style="border-radius:4px">xs 4</div>
  <div class="r" style="border-radius:8px">sm 8</div>
  <div class="r" style="border-radius:14px">md 14</div>
  <div class="r" style="border-radius:20px">lg 20</div>
  <div class="r" style="border-radius:28px">xl 28</div>
  <div class="r" style="border-radius:999px">pill</div>
</div>
</body></html>
