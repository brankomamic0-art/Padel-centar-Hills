<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:22px;}
  .row{display:flex;flex-direction:column;gap:12px;}
  .meta{font-family:var(--font-body);color:var(--fg-subtle);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;}
  p{margin:2px 0;}
  .eyebrow{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;}
</style></head>
<body>
<div class="row">
  <div><div class="meta">Satoshi 700 · eyebrow</div>
    <div class="eyebrow">Otvoreno 08 – 00h · Ilidža</div></div>
  <div><div class="meta">Satoshi 500 · body large</div>
    <p style="font-size:19px;font-weight:500;color:var(--fg);">4 premium indoor terena, Matchi TV snimanje mečeva.</p></div>
  <div><div class="meta">Satoshi 400 · body · 1.55 line</div>
    <p style="font-size:15px;color:var(--fg-muted);max-width:52ch;">Padel centar Hills u sklopu Hotel Hills kompleksa nudi vrhunsku infrastrukturu, profesionalnu školu i redovite turnire za sve razine.</p></div>
</div>
</body></html>
