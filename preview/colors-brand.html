<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--font-body);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{border-radius:12px;padding:14px;aspect-ratio:2.2/1;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--border);}
  .hex{font-family:var(--font-display);font-weight:800;font-size:15px;letter-spacing:-0.01em;}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;opacity:0.7;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0a1421;color:#fff;"><span class="lbl">navy 900</span><span class="hex">#0A1421</span></div>
  <div class="sw" style="background:#0d1b2a;color:#fff;"><span class="lbl">navy 800 · BASE</span><span class="hex">#0D1B2A</span></div>
  <div class="sw" style="background:#132536;color:#fff;"><span class="lbl">navy 700</span><span class="hex">#132536</span></div>
  <div class="sw" style="background:#1b3148;color:#fff;"><span class="lbl">navy 600</span><span class="hex">#1B3148</span></div>
  <div class="sw" style="background:#b3f000;color:#0d1b2a;"><span class="lbl">lime 500 · ACCENT</span><span class="hex">#B3F000</span></div>
  <div class="sw" style="background:#9fd800;color:#0d1b2a;"><span class="lbl">lime 600</span><span class="hex">#9FD800</span></div>
  <div class="sw" style="background:#c5ff33;color:#0d1b2a;"><span class="lbl">lime 400</span><span class="hex">#C5FF33</span></div>
  <div class="sw" style="background:#d9ff66;color:#0d1b2a;"><span class="lbl">lime 300</span><span class="hex">#D9FF66</span></div>
</div>
</body></html>
