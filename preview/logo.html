<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:22px;font-family:var(--font-body);}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .tile{background:var(--bg-elev);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-subtle);}
  .lt{background:#f6f8fa;}
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/logo.svg" width="72" height="72" alt=""><span class="lbl">Mark · 72</span></div>
  <div class="tile"><img src="../assets/logo.svg" width="40" height="40" alt=""><span class="lbl">Mark · 40</span></div>
  <div class="tile"><img src="../assets/logo.svg" width="24" height="24" alt=""><span class="lbl">Mark · 24</span></div>
  <div class="tile" style="padding:14px 22px"><img src="../assets/logo-wordmark.svg" width="220" height="40" alt=""><span class="lbl">Wordmark</span></div>
</div>
</body></html>
