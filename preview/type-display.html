<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:22px;}
  .row{display:flex;flex-direction:column;gap:10px;}
  .meta{font-family:var(--font-body);color:var(--fg-subtle);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;}
  .sample{font-family:var(--font-display);line-height:1.02;letter-spacing:-0.02em;color:var(--fg);}
</style></head>
<body>
<div class="row">
  <div><div class="meta">Cabinet Grotesk 800 · hero · clamp(3.25rem → 5.75rem)</div>
    <div class="sample" style="font-size:54px;font-weight:800;">Padel centar Hills</div></div>
  <div><div class="meta">Cabinet Grotesk 700 · h2 · text-2xl</div>
    <div class="sample" style="font-size:36px;font-weight:700;">Rezerviraj termin</div></div>
  <div><div class="meta">Cabinet Grotesk 700 · h3 · text-lg</div>
    <div class="sample" style="font-size:22px;font-weight:700;">Odaberi trajanje</div></div>
</div>
</body></html>
