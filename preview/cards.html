<!DOCTYPE html>
<html lang="hr"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg);padding:22px;font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .card{background:var(--bg-elev);border:1px solid var(--border);border-radius:14px;padding:20px;}
  .card.hl{border-color:var(--accent);box-shadow:0 0 24px rgba(179,240,0,0.2);}
  .stat{font-family:var(--font-display);font-weight:800;font-size:38px;color:var(--accent);line-height:1;letter-spacing:-0.02em;}
  .lbl{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-muted);margin-top:8px;}
  .tier{font-family:var(--font-display);font-weight:800;font-size:20px;}
  .pill{display:inline-block;background:var(--accent);color:var(--accent-ink);padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
  p{margin:6px 0 0;color:var(--fg-muted);font-size:13px;}
</style></head>
<body>
<div class="grid">
  <div class="card"><div class="stat">4</div><div class="lbl">Indoor terena</div></div>
  <div class="card hl"><div class="pill">VIP</div><div class="tier">Next Generation</div><p>Prioritetni termini, popusti, ekskluzivni eventi.</p></div>
  <div class="card"><div class="tier">Basic</div><p>Osnovne pogodnosti. Rezervacija bez reda.</p></div>
</div>
</body></html>
