<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Padel centar Hills</title>
<meta name="robots" content="noindex, nofollow">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #21262d;
  --fg:      #e6edf3;
  --muted:   #8b949e;
  --accent:  #b3f000;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --radius:  10px;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ---- Login ---- */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
}
.login-logo span {
  font-weight: 800;
  font-size: 16px;
  letter-spacing: .06em;
}
.login-logo em { color: var(--accent); font-style: normal; }
.login-card h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.login-card p {
  color: var(--muted);
  margin-bottom: 28px;
  font-size: 13px;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
  margin-bottom: 6px;
}
input[type="text"], input[type="password"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--fg);
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  transition: border-color .15s;
}
input:focus { border-color: var(--accent); }
.field { margin-bottom: 16px; }
.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #0d1117;
  border: none;
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
#login-error {
  margin-top: 14px;
  color: var(--red);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
}

/* ---- Dashboard ---- */
#dashboard { display: none; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: .05em;
}
.topbar-brand em { color: var(--accent); font-style: normal; }
.badge-admin {
  background: rgba(179,240,0,.15);
  color: var(--accent);
  border: 1px solid rgba(179,240,0,.3);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  letter-spacing: .05em;
}
.logout-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

.main-content { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.stat-val { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; }
.stat.pending .stat-val  { color: var(--yellow); }
.stat.accepted .stat-val { color: var(--green); }
.stat.rejected .stat-val { color: var(--red); }

.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  align-items: center;
}
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 13px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--fg); }
.filter-btn.active { background: rgba(179,240,0,.1); }

.section-title {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
}

.bookings-list { display: flex; flex-direction: column; gap: 10px; }

.booking-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  transition: border-color .15s;
}
.booking-card:hover { border-color: #30363d; }
.booking-card.pending  { border-left: 3px solid var(--yellow); }
.booking-card.accepted { border-left: 3px solid var(--green); }
.booking-card.rejected { border-left: 3px solid var(--red); opacity: .7; }

.booking-info { display: flex; flex-direction: column; gap: 4px; }
.booking-name { font-weight: 700; font-size: 15px; }
.booking-meta { color: var(--muted); font-size: 13px; }
.booking-meta strong { color: var(--fg); }

.booking-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .03em;
  margin-bottom: 8px;
}
.status-pending  { background: rgba(210,153,34,.15);  color: var(--yellow); }
.status-accepted { background: rgba(63,185,80,.15);   color: var(--green); }
.status-rejected { background: rgba(248,81,73,.15);   color: var(--red); }

.booking-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.action-btn {
  border: 1px solid var(--border);
  background: transparent;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  color: var(--fg);
}
.action-btn.accept { border-color: var(--green); color: var(--green); }
.action-btn.accept:hover { background: rgba(63,185,80,.15); }
.action-btn.reject { border-color: var(--red); color: var(--red); }
.action-btn.reject:hover { background: rgba(248,81,73,.15); }
.action-btn.delete { border-color: var(--border); color: var(--muted); }
.action-btn.delete:hover { border-color: var(--red); color: var(--red); }
.action-btn:disabled { opacity: .4; cursor: not-allowed; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state svg { margin-bottom: 12px; opacity: .4; }
.empty-state p { font-size: 15px; }

.booking-time-pill {
  font-size: 12px;
  background: rgba(179,240,0,.08);
  color: var(--accent);
  border-radius: 6px;
  padding: 2px 8px;
  display: inline-block;
  margin-top: 4px;
}

.created-at { font-size: 11px; color: var(--muted); margin-top: 2px; }

@media (max-width: 600px) {
  .booking-card { grid-template-columns: 1fr; }
  .booking-actions { justify-content: flex-start; }
  .topbar { padding: 0 16px; }
  .main-content { padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="#b3f000" fill-opacity=".12"/><circle cx="16" cy="16" r="8" fill="#b3f000" fill-opacity=".5"/><circle cx="16" cy="16" r="3" fill="#b3f000"/></svg>
      <span>PADEL CENTAR <em>HILLS</em></span>
    </div>
    <h1>Admin pristup</h1>
    <p>Unesite korisničke podatke za pristup upravljačkoj ploči.</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Korisničko ime</label>
        <input id="username" type="text" autocomplete="username" required placeholder="vlasnik">
      </div>
      <div class="field">
        <label for="password">Lozinka</label>
        <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Prijava</button>
      <div id="login-error"></div>
    </form>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="16" fill="#b3f000" fill-opacity=".12"/><circle cx="16" cy="16" r="8" fill="#b3f000" fill-opacity=".5"/><circle cx="16" cy="16" r="3" fill="#b3f000"/></svg>
      PADEL CENTAR <em>HILLS</em>
      <span class="badge-admin">ADMIN</span>
    </div>
    <button class="logout-btn" id="logout-btn">Odjava</button>
  </header>

  <div class="main-content">
    <div class="stats-row">
      <div class="stat pending"><div class="stat-val" id="count-pending">0</div><div class="stat-lbl">Na čekanju</div></div>
      <div class="stat accepted"><div class="stat-val" id="count-accepted">0</div><div class="stat-lbl">Prihvaćeno</div></div>
      <div class="stat rejected"><div class="stat-val" id="count-rejected">0</div><div class="stat-lbl">Odbijeno</div></div>
      <div class="stat"><div class="stat-val" id="count-total">0</div><div class="stat-lbl">Ukupno</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Sve</button>
      <button class="filter-btn" data-filter="pending">Na čekanju</button>
      <button class="filter-btn" data-filter="accepted">Prihvaćeno</button>
      <button class="filter-btn" data-filter="rejected">Odbijeno</button>
      <button class="filter-btn" id="refresh-btn" style="margin-left:auto">↻ Osvježi</button>
    </div>

    <div class="section-title">Rezervacije</div>
    <div class="bookings-list" id="bookings-list">
      <div class="empty-state">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <p>Nema rezervacija.</p>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let TOKEN = sessionStorage.getItem('admin_token') || '';
let allBookings = [];
let activeFilter = 'all';

// ---- Login ----
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Prijava…';
  errEl.textContent = '';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      TOKEN = data.token;
      sessionStorage.setItem('admin_token', TOKEN);
      showDashboard();
    } else {
      errEl.textContent = 'Pogrešno korisničko ime ili lozinka.';
    }
  } catch {
    errEl.textContent = 'Greška veze. Pokušajte ponovo.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Prijava';
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  TOKEN = '';
  sessionStorage.removeItem('admin_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

// ---- Auto-login if token exists ----
if (TOKEN) showDashboard();

async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await loadBookings();
}

// ---- Load bookings ----
async function loadBookings() {
  try {
    const res = await fetch('/api/admin/bookings', {
      headers: { 'x-admin-token': TOKEN },
    });
    if (res.status === 401) { logout(); return; }
    allBookings = await res.json();
    renderBookings();
    updateCounts();
  } catch {
    console.error('Failed to load bookings');
  }
}

document.getElementById('refresh-btn').addEventListener('click', loadBookings);

// ---- Filters ----
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderBookings();
  });
});

// ---- Render bookings ----
function renderBookings() {
  const list = document.getElementById('bookings-list');
  const filtered = activeFilter === 'all' ? allBookings : allBookings.filter(b => b.status === activeFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <p>Nema rezervacija u ovoj kategoriji.</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(b => {
    const statusLabel = { pending: 'Na čekanju', accepted: 'Prihvaćeno', rejected: 'Odbijeno' }[b.status] || b.status;
    const created = new Date(b.createdAt).toLocaleString('hr-HR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const racketLine = b.racket ? ' · <strong>Reket: Da</strong>' : '';
    const priceLine  = b.price ? ` · <strong>${b.price},00 KM${b.racket ? ' + 5,00 KM' : ''}</strong>` : '';

    return `<div class="booking-card ${b.status}" data-id="${b.id}">
      <div class="booking-info">
        <div>
          <span class="booking-status status-${b.status}">${statusLabel}</span>
        </div>
        <div class="booking-name">${esc(b.name)} ${esc(b.surname || '')}</div>
        <div class="booking-meta">
          Tel: <strong>${esc(b.phone || '—')}</strong>
        </div>
        <div class="booking-meta">
          <strong>${esc(b.date || '—')}</strong> · ${esc(b.court || '—')}
          <span class="booking-time-pill">${esc(b.startTime || '')}${b.endTime ? ' – ' + esc(b.endTime) : ''} · ${esc(String(b.duration || ''))} min</span>
        </div>
        <div class="booking-meta">${priceLine}${racketLine}</div>
        <div class="created-at">Prijavljeno: ${created}</div>
      </div>
      <div class="booking-actions">
        ${b.status !== 'accepted' ? `<button class="action-btn accept" onclick="setStatus('${b.id}','accepted')">✓ Prihvati</button>` : ''}
        ${b.status !== 'rejected' ? `<button class="action-btn reject" onclick="setStatus('${b.id}','rejected')">✕ Odbij</button>` : ''}
        <button class="action-btn delete" onclick="deleteBooking('${b.id}')">Obriši</button>
      </div>
    </div>`;
  }).join('');
}

function updateCounts() {
  document.getElementById('count-total').textContent    = allBookings.length;
  document.getElementById('count-pending').textContent  = allBookings.filter(b => b.status === 'pending').length;
  document.getElementById('count-accepted').textContent = allBookings.filter(b => b.status === 'accepted').length;
  document.getElementById('count-rejected').textContent = allBookings.filter(b => b.status === 'rejected').length;
}

async function setStatus(id, status) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) card.querySelectorAll('.action-btn').forEach(b => b.disabled = true);

  await fetch(`/api/admin/bookings/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
    body: JSON.stringify({ status }),
  });
  await loadBookings();
}

async function deleteBooking(id) {
  if (!confirm('Obrisati ovu rezervaciju?')) return;
  await fetch(`/api/admin/bookings/${id}`, {
    method: 'DELETE',
    headers: { 'x-admin-token': TOKEN },
  });
  await loadBookings();
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
