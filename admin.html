<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Padel centar Hills</title>
<meta name="robots" content="noindex, nofollow">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #21262d;
  --fg:      #e6edf3;
  --muted:   #8b949e;
  --accent:  #b3f000;
  --green:   #3fb950;
  --red:     #f85149;
  --yellow:  #d29922;
  --r:       10px;
}
body { background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; min-height:100vh; }

/* ── Login ── */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.login-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:100%; max-width:380px; }
.logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; font-weight:800; font-size:16px; letter-spacing:.06em; }
.logo em { color:var(--accent); font-style:normal; }
.login-card h1 { font-size:20px; font-weight:700; margin-bottom:8px; }
.login-card p { color:var(--muted); margin-bottom:28px; font-size:13px; }
label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:6px; }
input[type="text"], input[type="password"] { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:var(--r); color:var(--fg); padding:10px 14px; font-size:14px; outline:none; transition:border-color .15s; }
input:focus { border-color:var(--accent); }
.field { margin-bottom:16px; }
.btn-primary { width:100%; background:var(--accent); color:#0d1117; border:none; border-radius:var(--r); padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity .15s; }
.btn-primary:hover { opacity:.88; }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
#login-error { margin-top:14px; color:var(--red); font-size:13px; text-align:center; min-height:18px; }

/* ── Dashboard ── */
#dashboard { display:none; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
.topbar-brand { display:flex; align-items:center; gap:10px; font-weight:800; font-size:15px; letter-spacing:.05em; }
.topbar-brand em { color:var(--accent); font-style:normal; }
.badge { background:rgba(179,240,0,.15); color:var(--accent); border:1px solid rgba(179,240,0,.3); border-radius:20px; font-size:11px; font-weight:700; padding:2px 10px; letter-spacing:.05em; }
.logout-btn { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:var(--r); padding:6px 14px; font-size:13px; cursor:pointer; transition:border-color .15s,color .15s; }
.logout-btn:hover { border-color:var(--red); color:var(--red); }

.main { padding:28px 24px; max-width:960px; margin:0 auto; }

/* ── Stats ── */
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:28px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 20px; }
.stat-val { font-size:28px; font-weight:800; line-height:1; }
.stat-lbl { font-size:12px; color:var(--muted); margin-top:4px; font-weight:500; }
.stat.pending  .stat-val { color:var(--yellow); }
.stat.accepted .stat-val { color:var(--green); }
.stat.rejected .stat-val { color:var(--red); }

/* ── Filters ── */
.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; align-items:center; }
.filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:20px; padding:5px 16px; font-size:13px; cursor:pointer; font-weight:500; transition:all .15s; }
.filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--fg); }
.filter-btn.active { background:rgba(179,240,0,.1); }
#refresh-btn { margin-left:auto; }

.section-title { font-size:16px; font-weight:700; margin-bottom:14px; }

/* ── Cards ── */
.list { display:flex; flex-direction:column; gap:10px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; transition:border-color .15s; }
.card:hover { border-color:#30363d; }
.card.pending  { border-left:3px solid var(--yellow); }
.card.accepted { border-left:3px solid var(--green); }
.card.rejected { border-left:3px solid var(--red); opacity:.7; }

.card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.card-name { font-weight:700; font-size:15px; }
.card-email { color:var(--muted); font-size:13px; }
.card-phone { color:var(--muted); font-size:13px; }
.card-msg { margin-top:12px; padding:12px 14px; background:rgba(255,255,255,.04); border-radius:8px; color:var(--fg); font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
.card-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:14px; }
.card-meta { font-size:11px; color:var(--muted); }
.card-actions { display:flex; gap:8px; flex-wrap:wrap; }

.status-badge { display:inline-flex; align-items:center; border-radius:20px; padding:3px 12px; font-size:12px; font-weight:600; letter-spacing:.03em; }
.status-pending  { background:rgba(210,153,34,.15); color:var(--yellow); }
.status-accepted { background:rgba(63,185,80,.15);  color:var(--green); }
.status-rejected { background:rgba(248,81,73,.15);  color:var(--red); }

.action-btn { border:1px solid var(--border); background:transparent; border-radius:8px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; color:var(--fg); }
.action-btn.accept { border-color:var(--green); color:var(--green); }
.action-btn.accept:hover { background:rgba(63,185,80,.15); }
.action-btn.reject { border-color:var(--red); color:var(--red); }
.action-btn.reject:hover { background:rgba(248,81,73,.15); }
.action-btn.del { border-color:var(--border); color:var(--muted); }
.action-btn.del:hover { border-color:var(--red); color:var(--red); }
.action-btn:disabled { opacity:.4; cursor:not-allowed; }

.empty { text-align:center; padding:60px 20px; color:var(--muted); }
.empty svg { margin-bottom:12px; opacity:.35; }
.empty p { font-size:15px; }

@media (max-width:580px) {
  .topbar { padding:0 16px; }
  .main { padding:20px 16px; }
  .card-top { flex-direction:column; }
}
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="16" fill="#b3f000" fill-opacity=".12"/>
        <circle cx="16" cy="16" r="8"  fill="#b3f000" fill-opacity=".5"/>
        <circle cx="16" cy="16" r="3"  fill="#b3f000"/>
      </svg>
      PADEL CENTAR <em>HILLS</em>
    </div>
    <h1>Admin pristup</h1>
    <p>Unesite korisničke podatke za pristup upravljačkoj ploči.</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="uname">Korisničko ime</label>
        <input id="uname" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="upass">Lozinka</label>
        <input id="upass" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Prijava</button>
      <div id="login-error"></div>
    </form>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="16" fill="#b3f000" fill-opacity=".12"/>
        <circle cx="16" cy="16" r="8"  fill="#b3f000" fill-opacity=".5"/>
        <circle cx="16" cy="16" r="3"  fill="#b3f000"/>
      </svg>
      PADEL CENTAR <em>HILLS</em>
      <span class="badge">ADMIN</span>
    </div>
    <button class="logout-btn" id="logout-btn">Odjava</button>
  </header>

  <div class="main">
    <div class="stats">
      <div class="stat pending" ><div class="stat-val" id="cnt-pending">0</div><div class="stat-lbl">Na čekanju</div></div>
      <div class="stat accepted"><div class="stat-val" id="cnt-accepted">0</div><div class="stat-lbl">Prihvaćeno</div></div>
      <div class="stat rejected"><div class="stat-val" id="cnt-rejected">0</div><div class="stat-lbl">Odbijeno</div></div>
      <div class="stat"         ><div class="stat-val" id="cnt-total">0</div><div class="stat-lbl">Ukupno</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Sve</button>
      <button class="filter-btn" data-filter="pending">Na čekanju</button>
      <button class="filter-btn" data-filter="accepted">Prihvaćeno</button>
      <button class="filter-btn" data-filter="rejected">Odbijeno</button>
      <button class="filter-btn" id="refresh-btn">↻ Osvježi</button>
    </div>

    <div class="section-title">Upiti s Kontakt forme</div>
    <div class="list" id="contact-list"></div>
  </div>
</div>

<script>
let TOKEN = sessionStorage.getItem('admin_token') || '';
let all   = [];
let filter = 'all';

// ── Login ──────────────────────────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Prijava…';
  err.textContent = '';
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('uname').value.trim(),
        password: document.getElementById('upass').value,
      }),
    });
    const d = await r.json();
    if (d.ok) {
      TOKEN = d.token;
      sessionStorage.setItem('admin_token', TOKEN);
      showDashboard();
    } else {
      err.textContent = 'Pogrešno korisničko ime ili lozinka.';
    }
  } catch {
    err.textContent = 'Greška veze. Pokušajte ponovo.';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Prijava';
  }
});

document.getElementById('logout-btn').addEventListener('click', () => {
  TOKEN = '';
  sessionStorage.removeItem('admin_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

if (TOKEN) showDashboard();

// ── Dashboard ──────────────────────────────────────────────────────────────────
async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await load();
}

async function load() {
  try {
    const r = await fetch('/api/admin/contacts', { headers: { 'x-admin-token': TOKEN } });
    if (r.status === 401) { TOKEN = ''; sessionStorage.removeItem('admin_token'); location.reload(); return; }
    all = await r.json();
    render();
    updateStats();
  } catch { console.error('load failed'); }
}

document.getElementById('refresh-btn').addEventListener('click', load);

document.querySelectorAll('.filter-btn[data-filter]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.filter;
    render();
  });
});

function render() {
  const list = document.getElementById('contact-list');
  const items = filter === 'all' ? all : all.filter(c => c.status === filter);

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Nema upita u ovoj kategoriji.</p>
    </div>`;
    return;
  }

  const labels = { pending:'Na čekanju', accepted:'Prihvaćeno', rejected:'Odbijeno' };
  list.innerHTML = items.map(c => {
    const date = new Date(c.createdAt).toLocaleString('hr-HR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const phone = c.phone ? `<div class="card-phone">Tel: ${esc(c.phone)}</div>` : '';
    return `<div class="card ${c.status}" data-id="${c.id}">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(c.name)}</div>
          <div class="card-email">${esc(c.email)}</div>
          ${phone}
        </div>
        <span class="status-badge status-${c.status}">${labels[c.status] || c.status}</span>
      </div>
      <div class="card-msg">${esc(c.message)}</div>
      <div class="card-footer">
        <span class="card-meta">Primljeno: ${date}</span>
        <div class="card-actions">
          ${c.status !== 'accepted' ? `<button class="action-btn accept" onclick="setStatus('${c.id}','accepted')">✓ Prihvati</button>` : ''}
          ${c.status !== 'rejected' ? `<button class="action-btn reject" onclick="setStatus('${c.id}','rejected')">✕ Odbij</button>` : ''}
          <button class="action-btn del" onclick="del('${c.id}')">Obriši</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('cnt-total').textContent    = all.length;
  document.getElementById('cnt-pending').textContent  = all.filter(c => c.status === 'pending').length;
  document.getElementById('cnt-accepted').textContent = all.filter(c => c.status === 'accepted').length;
  document.getElementById('cnt-rejected').textContent = all.filter(c => c.status === 'rejected').length;
}

async function setStatus(id, status) {
  document.querySelector(`[data-id="${id}"]`)?.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
  await fetch(`/api/admin/contacts/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
    body: JSON.stringify({ status }),
  });
  await load();
}

async function del(id) {
  if (!confirm('Obrisati ovaj upit?')) return;
  await fetch(`/api/admin/contacts/${id}`, {
    method: 'DELETE',
    headers: { 'x-admin-token': TOKEN },
  });
  await load();
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
